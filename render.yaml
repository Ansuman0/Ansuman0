services:
  - type: web
    name: github-readme-stats
    runtime: node
    plan: free
    repo: https://github.com/anuraghazra/github-readme-stats
    branch: master
    buildCommand: npm install
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CACHE_SECONDS
        value: "86400"
